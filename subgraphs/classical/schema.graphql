extend schema @link(url: "https://specs.apollo.dev/federation/v2.3", import: ["@key"])

"""
The classical subgraph extends the same Artist entity with Bach performance
data. A jazz guitarist and a Bach performer with the same name are one person:
the shared slug @key joins them.
"""
type Artist @key(fields: "id") {
  id: ID!
  bachRecordings: [MovementRecording!]!
}

"""
Crossover join point: when a Tune in the catalog corresponds to a Bach movement
(BWV crossover pieces like 'Jesu, Joy of Man's Desiring'), the classical
subgraph contributes movementRecordings — the tracked performances of that
movement — to the Tune entity owned by the catalog subgraph.
"""
type Tune @key(fields: "id") {
  id: ID!
  "Classical/crossover performances of this tune. Empty for pure jazz tunes."
  movementRecordings: [MovementRecording!]!
}

"""
A work by J.S. Bach. The BWV number is the natural key here: the classical
world ships with stable public identifiers, so bwv works as a lookup key
without inventing ids.
"""
type Work {
  bwv: Int!
  title: String!
  movements: [Movement!]!
}

type Movement {
  id: ID!
  name: String!
  key: String
  work: Work!
  recordings: [MovementRecording!]!
  """
  The catalog Tune that maps to this movement, when it is a crossover piece
  (e.g. BWV 147 'Jesu, Joy of Man's Desiring' recorded by jazz musicians).
  Null when no catalog entry exists for this movement.
  """
  tune: Tune
}

type MovementRecording {
  id: ID!
  movement: Movement!
  performer: Artist!
  "Record label or source ('DG/EMI', 'Netherlands Bach Society'). Null when unknown."
  label: String
  "One-line interpretive character ('Poised, clear', 'HIP-leaning')."
  character: String
  notes: String
  bpm: Int
}

type Query {
  work(bwv: Int!): Work
  works: [Work!]!
}
