# Artists + catalog + classical (:4001 + :4002 + :4003)
# Full crossover on one Tune:
#   recordings / album     → catalog (jazz edge: MJQ, Jim Hall, Miles)
#   movementRecordings     → classical (Romeros, Williams, Paco, …)
#   artists / performer    → artists (shared person pool)
# Joins on Tune @key and Artist @key in one selection set.
query FullCrossover {
  tune(id: "concierto-de-aranjuez-ii-adagio") {
    id
    title
    recordings {
      key
      bpm
      artists {
        name
        instrument
      }
      album {
        title
        year
        label
      }
    }
    movementRecordings {
      label
      character
      performer {
        name
        instrument
      }
    }
  }
}
