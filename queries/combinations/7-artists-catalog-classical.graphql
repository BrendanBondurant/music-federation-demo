# Combination: ARTISTS + CATALOG + CLASSICAL (:4001 + :4002 + :4003)
# The full crossover: one Tune, both edges, with performing artists resolved.
# - tune / title / recordings / album  -> catalog (jazz edge)
# - artists.name/instrument, performer.name/instrument -> artists (shared pool)
# - movementRecordings -> classical (classical edge)
# All three subgraphs contribute to a single selection set, joined on the
# Tune @key and the Artist @key. The Aranjuez Adagio returns jazz players on
# one edge (MJQ/Almeida, Jim Hall, Miles Davis) and classical guitarists on the
# other (the Romeros, John Williams, Paco de Lucía, Sáinz de la Maza).
query ArtistsCatalogClassical {
  tune(id: "concierto-de-aranjuez-ii-adagio") {
    id
    title
    recordings {
      key
      bpm
      artists {
        name
        instrument
      }
      album {
        title
        year
        label
      }
    }
    movementRecordings {
      label
      character
      performer {
        name
        instrument
      }
    }
  }
}
