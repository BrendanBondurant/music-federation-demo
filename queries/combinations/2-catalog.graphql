# Combination: CATALOG only (:4002)
# A tune and an album with their track list. Everything selected is catalog-
# owned (Tune, Album, Track), so no fetch leaves the catalog subgraph. Asking
# for composedBy or any artist name would pull in the artists subgraph.
query CatalogOnly {
  tune(id: "alone-together") {
    id
    title
    composer
    style
  }
  album(id: "3-dimensional") {
    id
    title
    year
    recordingYear
    label
    tracks {
      key
      tune {
        title
        composer
      }
    }
  }
}
