# Crossover: one person's jazz albums AND Bach recordings in one query.
# The vault currently has zero jazz/Bach crossover people, so albums returns
# [] for Chris Thile -- honestly. Add one album file to the vault (e.g.
# "Chris Thile & Brad Mehldau", Nonesuch 2017) and re-seed, and this query
# lights up with no schema or code change.
{
  artist(id: "chris-thile") {
    name
    instrument
    albums {
      title
      year
    }
    bachRecordings {
      movement {
        name
        work {
          bwv
          title
        }
      }
      label
    }
  }
}
