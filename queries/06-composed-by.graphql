# Composer edge (artists + catalog)
# Jim Hall wrote "Careful"; composedTunes resolves through the shared person
# pool, then walks into recordings of those tunes.
query ComposedBy {
  artist(id: "jim-hall") {
    name
    composedTunes {
      title
      composer
      composedBy {
        name
        instrument
      }
      recordings {
        artists {
          name
          instrument
        }
        album {
          title
          year
        }
      }
    }
  }
}
