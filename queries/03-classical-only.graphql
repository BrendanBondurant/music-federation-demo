# Classical only (:4003)
# Work → movements → recordings. Do NOT select performer.name — that resolves
# the Artist through the artists subgraph and turns this into a two-subgraph query.
query ClassicalOnly {
  work(id: "bwv-1001") {
    id
    composer
    title
    bwv
    movements {
      id
      name
      key
      recordings {
        label
        character
        notes
        bpm
      }
    }
  }
}
