# Catalog + classical (:4002 + :4003)
# Crossover on Tune @key without touching artists. Jazz recordings come from
# catalog; movementRecordings from classical. The Aranjuez Adagio shares one id
# across both subgraphs. No artist name is selected, so artists is never fetched.
query CatalogClassical {
  tune(id: "concierto-de-aranjuez-ii-adagio") {
    id
    title
    recordings {
      key
      album {
        title
        year
      }
    }
    movementRecordings {
      label
      character
    }
  }
}
