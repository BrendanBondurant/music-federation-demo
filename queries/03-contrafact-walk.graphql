# Contrafact walk: a self-edge in catalog, fanning out to discography.
# All The Things You Are is the only tune with an in-vault ## Contrafacts
# section post-reorg, carrying Ablution and Bird of Paradise. Each contrafact
# resolves its own composer into the shared artist pool and its own
# recordings from the discography.
query AllTheThingsYouAreFamily {
  tune(id: "all-the-things-you-are") {
    title
    composer {
      name
    }
    contrafacts {
      title
      composer {
        name
      }
      recordings {
        performers {
          artist {
            name
          }
        }
        album {
          title
          year
        }
      }
    }
  }
}
