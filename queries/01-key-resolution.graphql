# @key resolution -- the headline query.
# name + instrument come from the artists subgraph, albums from catalog.
# The router's query plan (dropdown in the playground) shows fetches to both.
{
  artist(id: "jim-hall") {
    name
    instrument
    albums {
      title
      year
      recordings {
        tune {
          title
        }
      }
    }
  }
}
